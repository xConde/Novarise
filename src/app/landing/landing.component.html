<div class="landing-container">
  <div class="landing-content">
    <h1 class="landing-title">NOVARISE</h1>
    <p class="landing-subtitle">Card-Driven Tower Defense Roguelite</p>

    <div class="landing-actions">
      <button
        *ngIf="hasSavedRun"
        class="landing-btn landing-btn--primary"
        (click)="continueRun()">
        Continue Run
      </button>
      <button
        class="landing-btn"
        [class.landing-btn--primary]="!hasSavedRun"
        (click)="startNewRun()">
        {{ hasSavedRun ? 'Start New Run' : 'Start Run' }}
      </button>
      <button class="landing-btn landing-btn--muted" (click)="goToProfile()">
        Profile
      </button>
    </div>
  </div>

  <span class="landing-version">v0.2.0 · turn-based pivot</span>
</div>
