<div class="reward-screen" role="main" aria-label="Victory reward screen">

  <!-- Header -->
  <div class="reward-header">
    <h2 class="reward-title" aria-live="polite">Victory!</h2>
    <p class="reward-gold" [attr.aria-label]="'Gold earned: ' + config.goldPickup + ' gold'">
      +{{ config.goldPickup }}g
    </p>
  </div>

  <!-- Challenges completed — shown only when the encounter is a campaign
       map with challenge objectives and at least one was satisfied. The
       per-challenge gold bonus is already included in config.goldPickup;
       this block surfaces the breakdown so the player sees what earned it. -->
  <section class="reward-challenges"
           *ngIf="config.completedChallenges.length > 0"
           [attr.aria-label]="'Completed ' + config.completedChallenges.length + ' challenges for ' + totalChallengeGold + ' bonus gold'">
    <h3 class="reward-challenges-title">
      Challenges Completed
      <span class="reward-challenges-total">+{{ totalChallengeGold }}g</span>
    </h3>
    <ul class="reward-challenge-list" role="list">
      <li *ngFor="let challenge of config.completedChallenges"
          class="reward-challenge-item" role="listitem">
        <span class="reward-challenge-check" aria-hidden="true">
          <app-icon name="check" [size]="14"></app-icon>
        </span>
        <span class="reward-challenge-name">{{ challenge.name }}</span>
        <span class="reward-challenge-desc">{{ challenge.description }}</span>
        <span class="reward-challenge-gold">+{{ challengeGoldBonus(challenge) }}g</span>
      </li>
    </ul>
  </section>

  <!-- Relic choices -->
  <section class="reward-choices" *ngIf="relicCards.length > 0 && !relicPicked">
    <h3 class="reward-choices-title">Choose a Relic</h3>
    <p class="reward-choices-hint">Select one to add to your run, or skip.</p>

    <div class="reward-card-list" role="list">
      <button
        class="reward-card"
        [class]="'reward-card reward-card--' + getRarityClass(relic.rarity)"
        [class.reward-card--selected]="selectedRelic === relic.id"
        *ngFor="let relic of relicCards"
        (click)="pickRelic(relic)"
        [attr.aria-label]="relic.name + ': ' + relic.description + '. Rarity: ' + relic.rarity"
        [attr.aria-pressed]="selectedRelic === relic.id"
        role="listitem"
        type="button"
      >
        <span class="reward-card__icon" aria-hidden="true"><app-icon name="diamond" [size]="16"></app-icon></span>
        <span class="reward-card__rarity">{{ relic.rarity }}</span>
        <span class="reward-card__name">{{ relic.name }}</span>
        <span class="reward-card__description">{{ relic.description }}</span>
        <em class="reward-card__flavor">{{ relic.flavorText }}</em>
        <span class="reward-card__check" *ngIf="selectedRelic === relic.id" aria-hidden="true"><app-icon name="check" [size]="14"></app-icon></span>
      </button>
    </div>

    <button
      class="run-btn run-btn--secondary reward-skip-btn"
      type="button"
      (click)="skipRelics()"
      aria-label="Skip relics and continue without picking one"
    >
      Skip Relics
    </button>
  </section>

  <!-- Confirmation after pick / skip -->
  <section class="reward-picked" *ngIf="relicPicked" aria-live="polite">
    <p *ngIf="selectedRelic; else skippedTpl" class="reward-picked__message reward-picked__message--selected">
      Relic acquired!
    </p>
    <ng-template #skippedTpl>
      <p class="reward-picked__message reward-picked__message--skipped">No relic taken.</p>
    </ng-template>
  </section>

  <!-- Card choices (shown after relic section is resolved, or immediately when no relics) -->
  <app-card-draft
    *ngIf="config.cardChoices.length > 0 && !cardPicked && (relicPicked || config.relicChoices.length === 0)"
    [cardChoices]="config.cardChoices"
    (cardPicked)="onCardPicked($event)"
    (skipped)="onCardSkipped()">
  </app-card-draft>

  <!-- Continue -->
  <button
    class="run-btn run-btn--primary reward-continue-btn"
    type="button"
    *ngIf="canContinue"
    (click)="continue()"
    aria-label="Continue to the node map"
  >
    Continue
  </button>

</div>
