<section class="card-draft" aria-label="Choose a card reward">

  <h3 class="card-draft__title">Choose a Card</h3>
  <p class="card-draft__hint">Select one card to add to your deck, or skip.</p>

  <div class="card-draft__list" role="list">
    <button
      *ngFor="let item of resolvedCards; let i = index"
      class="card-draft__card"
      [class]="'card-draft__card ' + getTypeClass(item.definition.type) + ' ' + getRarityClass(item.definition.rarity) + ' ' + getFrameClass(item.definition.type)"
      [class.card-draft__card--selected]="selectedCard === item.reward.cardId"
      (click)="pickCard(item.reward)"
      [attr.aria-label]="'Option ' + (i + 1) + '. ' + item.definition.name + ': ' + item.definition.description + '. Type: ' + item.definition.type + '. Cost: ' + item.definition.energyCost + ' energy. Press ' + (i + 1) + ' to pick.'"
      [attr.aria-pressed]="selectedCard === item.reward.cardId"
      [attr.aria-keyshortcuts]="(i + 1).toString()"
      role="listitem"
      type="button"
    >
      <!-- Hotkey badge -->
      <span class="card-draft__hotkey" aria-hidden="true">{{ i + 1 }}</span>

      <!-- Energy cost bubble -->
      <span class="card-draft__cost" aria-hidden="true">{{ item.definition.energyCost }}</span>

      <!-- Type badge -->
      <span class="card-draft__type-badge">{{ item.definition.type }}</span>

      <!-- Card name -->
      <span class="card-draft__name">{{ item.definition.name }}</span>

      <!-- Description -->
      <span class="card-draft__description">{{ item.definition.description }}</span>

      <!-- Rarity label -->
      <span class="card-draft__rarity">{{ item.definition.rarity }}</span>

      <!-- Selected indicator -->
      <span class="card-draft__check" *ngIf="selectedCard === item.reward.cardId" aria-hidden="true">
        <app-icon name="check" [size]="14"></app-icon>
      </span>
    </button>
  </div>

  <button
    class="run-btn run-btn--secondary card-draft__skip-btn"
    type="button"
    (click)="skip()"
    [attr.aria-label]="skipGoldAmount > 0 ? 'Skip reward, gain ' + skipGoldAmount + ' gold. Press Escape to skip.' : 'Skip reward. Press Escape to skip.'"
    aria-keyshortcuts="Escape"
  >
    <ng-container *ngIf="skipGoldAmount > 0; else plainSkip">
      Skip <span class="card-draft__skip-gold" aria-hidden="true">(+{{ skipGoldAmount }}g)</span>
    </ng-container>
    <ng-template #plainSkip>Skip Card</ng-template>
    <span class="card-draft__skip-btn__hint" aria-hidden="true"> (Esc)</span>
  </button>

</section>
