<div class="act-transition" role="main" [attr.aria-label]="'Act ' + completedActLabel + ' complete'">

  <!-- Glow orb (CSS only) -->
  <div class="act-transition__glow" aria-hidden="true"></div>

  <!-- Title -->
  <h1 class="act-transition__title">Act {{ completedActLabel }} Complete!</h1>

  <!-- Boss defeated line -->
  <p class="act-transition__boss" *ngIf="bossName">
    <span class="act-transition__boss-label">Boss Defeated:</span>
    <span class="act-transition__boss-name">{{ bossName }}</span>
  </p>

  <!-- Stats cards -->
  <div class="act-transition__stats" [attr.aria-label]="'Run statistics for Act ' + completedActLabel">
    <div class="stat-card">
      <span class="stat-card__value">{{ encounterCount }}</span>
      <span class="stat-card__label">Encounters</span>
    </div>
    <div class="stat-card">
      <span class="stat-card__value">{{ relicCount }}</span>
      <span class="stat-card__label">Relics</span>
    </div>
  </div>

  <!-- Continue button -->
  <button
    class="act-transition__btn"
    type="button"
    (click)="continue()"
    [attr.aria-label]="'Continue to Act ' + nextActLabel"
  >
    Continue to Act {{ nextActLabel }}
  </button>

</div>
