<div class="rest-screen" role="main" aria-label="Rest site">

  <!-- Rest icon -->
  <div class="rest-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg></div>

  <!-- Title -->
  <h2 class="rest-title">Rest Site</h2>
  <p class="rest-subtitle">Take a moment to recover or upgrade a card.</p>

  <!-- Lives display -->
  <div class="rest-lives" [attr.aria-label]="'Current lives: ' + currentLives + ' of ' + maxLives">
    <span class="rest-lives__heart" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1" aria-hidden="true"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78Z"/></svg></span>
    <span class="rest-lives__value">{{ currentLives }} / {{ maxLives }}</span>
  </div>

  <!-- Heal preview -->
  <div class="rest-heal-preview" *ngIf="!atFullHealth && activeAction !== 'upgrade'">
    <span class="rest-heal-preview__amount" [attr.aria-label]="'Healing ' + actualHeal + ' lives'">
      +{{ actualHeal }} lives
    </span>
    <span class="rest-heal-preview__arrow" aria-hidden="true"> &#8594; </span>
    <span class="rest-heal-preview__result">{{ livesAfterHeal }} / {{ maxLives }}</span>
  </div>

  <p class="rest-full-notice" *ngIf="atFullHealth && activeAction !== 'upgrade'" aria-live="polite">
    You are already at full health.
  </p>

  <!-- Card upgrade selection panel -->
  <div class="rest-upgrade-panel" *ngIf="activeAction === 'upgrade'" role="region" aria-label="Select a card to upgrade">
    <h3 class="rest-upgrade-title">Select a card to upgrade</h3>
    <p class="rest-upgrade-hint" *ngIf="getUniqueUpgradableCards().length === 0" aria-live="polite">
      No upgradable cards in your deck.
    </p>
    <ul class="rest-card-list" role="list" *ngIf="getUniqueUpgradableCards().length > 0">
      <li
        *ngFor="let card of getUniqueUpgradableCards()"
        class="rest-card-item"
        role="listitem"
      >
        <button
          class="rest-card-btn ascent-btn ascent-btn--secondary"
          type="button"
          (click)="selectCardToUpgrade(card)"
          [attr.aria-label]="'Upgrade ' + getCardName(card)"
        >
          <span class="rest-card-btn__name">{{ getCardName(card) }}</span>
          <span class="rest-card-btn__desc">{{ getCardDescription(card) }}</span>
        </button>
      </li>
    </ul>
    <button
      class="ascent-btn ascent-btn--secondary rest-btn"
      type="button"
      (click)="cancelUpgrade()"
      aria-label="Cancel card upgrade"
    >
      Cancel
    </button>
  </div>

  <!-- Main actions (hidden while selecting upgrade) -->
  <div class="rest-actions" *ngIf="activeAction !== 'upgrade'">
    <button
      class="ascent-btn ascent-btn--primary rest-btn"
      type="button"
      (click)="rest()"
      [disabled]="atFullHealth"
      [attr.aria-label]="atFullHealth ? 'Already at full health' : 'Rest and heal ' + actualHeal + ' lives'"
    >
      {{ atFullHealth ? 'Already at full health' : 'Rest' }}
    </button>

    <button
      class="ascent-btn ascent-btn--secondary rest-btn"
      type="button"
      (click)="showUpgradePanel()"
      [disabled]="upgradableCards.length === 0"
      aria-label="Upgrade a card from your deck"
    >
      Upgrade a Card
    </button>

    <button
      class="ascent-btn ascent-btn--secondary rest-btn"
      type="button"
      (click)="skip()"
      aria-label="Skip rest and continue to the node map"
    >
      Skip
    </button>
  </div>

</div>
