<!-- Relic Inventory: compact icon row with hover tooltip -->
<div class="relic-inventory" aria-label="Relic inventory">

  <!-- Empty state -->
  <span class="relic-inventory__empty" *ngIf="relics.length === 0" aria-live="polite">
    No relics
  </span>

  <!-- Relic badges -->
  <button
    *ngFor="let relic of relics"
    class="relic-badge"
    [class]="getRarityClass(relic.rarity)"
    [style.background]="getBadgeBg(relic.rarity)"
    [style.border-color]="getBadgeBorder(relic.rarity)"
    [attr.aria-label]="relic.name + ' — ' + relic.description"
    [attr.aria-describedby]="hoveredRelic?.id === relic.id ? 'relic-tooltip' : null"
    type="button"
    (mouseenter)="showTooltip(relic, $event)"
    (mouseleave)="hideTooltip()"
    (focus)="showTooltip(relic, $event)"
    (blur)="hideTooltip()"
    (keydown.escape)="hideTooltip()"
  >
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="12 2 22 9 12 22 2 9"/></svg>
  </button>

  <!-- Floating tooltip -->
  <div
    *ngIf="hoveredRelic"
    id="relic-tooltip"
    class="relic-tooltip"
    [class]="getRarityClass(hoveredRelic.rarity)"
    [style.left.px]="tooltipX"
    [style.top.px]="tooltipY"
    role="tooltip"
    aria-live="polite"
  >
    <div class="relic-tooltip__name">{{ hoveredRelic.name }}</div>
    <div class="relic-tooltip__desc">{{ hoveredRelic.description }}</div>
    <div class="relic-tooltip__flavor">{{ hoveredRelic.flavorText }}</div>
    <span class="relic-tooltip__rarity">{{ hoveredRelic.rarity }}</span>
  </div>

</div>
