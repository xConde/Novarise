<div class="campaign-container">
  <div class="campaign-content">
    <h1 class="campaign-title">CAMPAIGN</h1>
    <p class="campaign-subtitle">Tower Defense</p>

    <div class="campaign-stats" aria-label="Campaign progress">
      <span class="campaign-stat">
        <span class="campaign-stat__value">{{ completedCount }}</span>
        <span class="campaign-stat__label">Completed</span>
      </span>
      <span class="campaign-stat">
        <span class="campaign-stat__value campaign-stat__value--gold">{{ totalStars }}</span>
        <span class="campaign-stat__label">Stars</span>
      </span>
    </div>

    <div class="campaign-complete" *ngIf="isCampaignComplete" role="status" aria-label="Campaign complete">
      <h2 class="campaign-complete__title">CAMPAIGN COMPLETE</h2>
      <p class="campaign-complete__subtitle">You have conquered all challenges</p>
    </div>

    <div class="level-grid" role="list" aria-label="Campaign levels">
      <button
        *ngFor="let view of levelViews"
        class="level-card"
        [class.level-card--unlocked]="view.unlocked"
        [class.level-card--locked]="!view.unlocked"
        [class.level-card--completed]="view.completed"
        [disabled]="!view.unlocked"
        [attr.aria-label]="'Level ' + view.level.number + ': ' + view.level.name + (view.unlocked ? '' : ' (locked)')"
        (click)="playLevel(view.level)"
        role="listitem"
      >
        <div class="level-card__header">
          <span class="level-card__number">{{ view.level.number }}</span>
          <span class="level-card__lock" *ngIf="!view.unlocked" aria-hidden="true">&#128274;</span>
          <div class="level-card__stars" aria-hidden="true" *ngIf="view.completed">
            <span
              *ngFor="let filled of view.stars"
              class="level-card__star"
              [class.level-card__star--filled]="filled"
            >&#9733;</span>
          </div>
        </div>

        <div class="level-card__body">
          <span class="level-card__name">{{ view.level.name }}</span>
          <span class="level-card__tier">{{ view.level.tier | uppercase }}</span>
          <p class="level-card__description" *ngIf="view.unlocked">{{ view.level.description }}</p>
        </div>

        <div class="level-card__meta" *ngIf="view.unlocked">
          <span class="level-card__meta-item">{{ view.level.waveCount }} waves</span>
          <span class="level-card__meta-item">{{ view.level.gridSize }}x{{ view.level.gridSize }}</span>
        </div>

        <div class="level-card__score" *ngIf="view.completed">
          <span class="level-card__score-label">Best</span>
          <span class="level-card__score-value">{{ view.progress?.bestScore }}</span>
        </div>

        <div class="level-card__challenges" *ngIf="view.unlocked" aria-label="Challenge badges">
          <span
            *ngFor="let challenge of view.challenges; let i = index"
            class="challenge-badge"
            [class.challenge-badge--complete]="view.challengeCompletion[i]"
            [class.challenge-badge--incomplete]="!view.challengeCompletion[i]"
            [title]="challenge.name + ': ' + challenge.description"
          >&#9670;</span>
        </div>
      </button>
    </div>

    <button class="back-btn" (click)="goHome()">Home</button>
  </div>
</div>
