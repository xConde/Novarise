<div class="game-container">
  <div class="title">
    <div class="letter" *ngFor="let letter of title.split(''); let i = index">
      {{ letter }}
    </div>
  </div>

  <!-- Init error fallback -->
  <div class="init-error-overlay" *ngIf="initError">
    <div class="init-error-content">
      <h2>Unable to Start Editor</h2>
      <p>{{ initError }}</p>
      <p class="init-error-hint">Try using a modern browser with WebGL support, or check your graphics drivers.</p>
      <button class="init-error-btn" routerLink="/maps">Back to Maps</button>
    </div>
  </div>

  <!-- Loading overlay -->
  <div class="loading-overlay" *ngIf="isLoading && !initError">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <p class="loading-text">Initializing...</p>
    </div>
  </div>

  <div class="novarise-content">
    <div #canvasContainer class="canvas-container"></div>

    <!-- Mobile dual-stick controls (shown on touch devices) -->
    <app-virtual-joystick
      type="movement"
      position="left"
      (joystickChange)="onJoystickChange($event)">
    </app-virtual-joystick>

    <app-virtual-joystick
      type="rotation"
      position="right"
      [sensitivity]="1.5"
      (joystickChange)="onJoystickChange($event)">
    </app-virtual-joystick>

    <app-edit-controls
      [editMode]="editMode"
      [selectedTerrainType]="selectedTerrainType"
      [brushSize]="brushSize"
      [activeTool]="activeTool"
      [canPlayMap]="canPlayMap"
      [isPathValid]="isPathValid"
      [hasSpawnAndExit]="hasSpawnAndExit"
      [templates]="templates"
      (editModeChange)="setEditMode($event)"
      (terrainTypeChange)="setTerrainType($event)"
      (brushSizeChange)="setBrushSize($event)"
      (activeToolChange)="setActiveTool($event)"
      (playMapClick)="playMap()"
      (templateSelect)="loadTemplate($event)">
    </app-edit-controls>
  </div>
</div>
