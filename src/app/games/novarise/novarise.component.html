<div class="game-container">
  <div class="title">
    <div class="letter" *ngFor="let letter of title.split(''); let i = index">
      {{ letter }}
    </div>
  </div>

  <div class="novarise-content">
    <div #canvasContainer class="canvas-container"></div>

    <!-- Mobile dual-stick controls (shown on touch devices) -->
    <app-virtual-joystick
      type="movement"
      position="left"
      (joystickChange)="onJoystickChange($event)">
    </app-virtual-joystick>

    <app-virtual-joystick
      type="rotation"
      position="right"
      [sensitivity]="1.5"
      (joystickChange)="onJoystickChange($event)">
    </app-virtual-joystick>

    <app-edit-controls
      [editMode]="editMode"
      [selectedTerrainType]="selectedTerrainType"
      [brushSize]="brushSize"
      [activeTool]="activeTool"
      [canPlayMap]="canPlayMap"
      [isPathValid]="isPathValid"
      [hasSpawnAndExit]="hasSpawnAndExit"
      (editModeChange)="setEditMode($event)"
      (terrainTypeChange)="setTerrainType($event)"
      (brushSizeChange)="setBrushSize($event)"
      (activeToolChange)="setActiveTool($event)"
      (playMapClick)="playMap()"
      (openMapManagerClick)="openMapManager()">
    </app-edit-controls>

    <!-- Navigation links -->
    <div class="editor-nav-links">
      <button class="nav-btn" (click)="goToCampaign()">Campaign</button>
      <button class="nav-btn" (click)="goToMaps()">My Maps</button>
    </div>

    <!-- Map Manager Dialog -->
    <div class="map-manager-overlay" *ngIf="mapManagerOpen" (click)="closeMapManager()">
      <div class="map-manager-panel" (click)="$event.stopPropagation()">
        <div class="map-manager-header">
          <h2 class="map-manager-title">Saved Maps</h2>
          <button class="map-manager-close" (click)="closeMapManager()" aria-label="Close map manager">✕</button>
        </div>

        <div class="map-manager-empty" *ngIf="savedMaps.length === 0">
          No saved maps yet. Use G to save your current map.
        </div>

        <ul class="map-list" *ngIf="savedMaps.length > 0">
          <li *ngFor="let map of savedMaps" class="map-list-item"
              [class.map-list-item--confirm]="deleteConfirmId === map.id">

            <!-- Rename input (active when renaming this map) -->
            <ng-container *ngIf="renamingMapId === map.id; else displayMode">
              <input
                class="map-rename-input"
                type="text"
                [(ngModel)]="renameValue"
                (keydown.enter)="submitRename(map.id)"
                (keydown.escape)="cancelRename()"
                (blur)="submitRename(map.id)"
                maxlength="50"
                aria-label="Rename map"
                #renameInput>
              <div class="map-item-actions">
                <button class="map-action-btn map-action-btn--confirm-rename" (click)="submitRename(map.id)" aria-label="Confirm rename">✓</button>
                <button class="map-action-btn map-action-btn--cancel" (click)="cancelRename()" aria-label="Cancel rename">✕</button>
              </div>
            </ng-container>

            <!-- Normal display mode -->
            <ng-template #displayMode>
              <div class="map-item-info" (click)="loadMapFromManager(map.id)">
                <span class="map-item-name">{{ map.name }}</span>
                <span class="map-item-date">{{ map.updatedAt | date:'short' }}</span>
              </div>
              <div class="map-item-actions">
                <!-- Delete confirm state -->
                <ng-container *ngIf="deleteConfirmId === map.id; else normalActions">
                  <span class="map-delete-confirm-label">Delete?</span>
                  <button class="map-action-btn map-action-btn--danger" (click)="deleteMap(map.id)" aria-label="Confirm delete">✓</button>
                  <button class="map-action-btn map-action-btn--cancel" (click)="cancelDelete()" aria-label="Cancel delete">✕</button>
                </ng-container>

                <ng-template #normalActions>
                  <button class="map-action-btn map-action-btn--rename" (click)="startRename(map.id, map.name)" aria-label="Rename map">✎</button>
                  <button class="map-action-btn map-action-btn--delete" (click)="confirmDelete(map.id)" aria-label="Delete map">✕</button>
                </ng-template>
              </div>
            </ng-template>
          </li>
        </ul>
      </div>
    </div>
  </div>
</div>
