<div class="game-container">
  <div class="title">
    <div class="letter" *ngFor="let letter of title.split(''); let i = index">
      {{ letter }}
    </div>
  </div>

  <div class="novarise-content">
    <div #canvasContainer class="canvas-container"></div>

    <!-- WebGL Context Lost Overlay -->
    <div class="context-lost-overlay" *ngIf="contextLost" role="alert" aria-live="assertive">
      <div class="context-lost-content">
        <h2 class="context-lost-title">Display Lost</h2>
        <p class="context-lost-message">The graphics context was interrupted.</p>
        <p class="context-lost-hint">Waiting for recovery...</p>
      </div>
    </div>

    <!-- Mobile dual-stick controls (shown on touch devices) -->
    <app-virtual-joystick
      type="movement"
      position="left"
      (joystickChange)="onJoystickChange($event)">
    </app-virtual-joystick>

    <app-virtual-joystick
      type="rotation"
      position="right"
      [sensitivity]="1.5"
      (joystickChange)="onJoystickChange($event)">
    </app-virtual-joystick>

    <app-edit-controls
      [editMode]="editMode"
      [selectedTerrainType]="selectedTerrainType"
      [brushSize]="brushSize"
      [activeTool]="activeTool"
      [canPlayMap]="canPlayMap"
      [isPathValid]="isPathValid"
      [hasSpawnAndExit]="hasSpawnAndExit"
      [templates]="templates"
      (editModeChange)="setEditMode($event)"
      (terrainTypeChange)="setTerrainType($event)"
      (brushSizeChange)="setBrushSize($event)"
      (activeToolChange)="setActiveTool($event)"
      (playMapClick)="playMap()"
      (templateSelect)="loadTemplate($event)">
    </app-edit-controls>

    <!-- Editor toast notifications (replaces alert() calls) -->
    <div
      *ngIf="editorNotification"
      class="editor-toast"
      [class.editor-toast--success]="editorNotification.type === 'success'"
      [class.editor-toast--error]="editorNotification.type === 'error'"
      role="status"
      aria-live="polite">
      {{ editorNotification.message }}
    </div>

    <!-- Inline modal (replaces browser prompt()/confirm()) -->
    <div
      *ngIf="showModal"
      class="editor-modal-overlay"
      (click)="cancelModal()"
      role="presentation">
      <div
        class="editor-modal"
        (click)="$event.stopPropagation()"
        role="dialog"
        aria-modal="true"
        [attr.aria-label]="modalTitle">
        <h3 class="editor-modal-title">{{ modalTitle }}</h3>

        <!-- Input mode: single text field -->
        <input
          *ngIf="modalType === 'input'"
          [(ngModel)]="modalInputValue"
          (keyup.enter)="confirmModal()"
          (keyup.escape)="cancelModal()"
          class="editor-modal-input"
          aria-label="Map name"
          autofocus>

        <!-- Select mode: list of options -->
        <ul *ngIf="modalType === 'select'" class="editor-modal-list" role="listbox">
          <li
            *ngFor="let option of modalSelectOptions; let i = index"
            class="editor-modal-list-item"
            role="option"
            tabindex="0"
            (click)="selectModalOption(i)"
            (keyup.enter)="selectModalOption(i)">
            {{ option }}
          </li>
        </ul>

        <!-- Action buttons (not shown in select mode — clicking an option acts as confirm) -->
        <div *ngIf="modalType !== 'select'" class="editor-modal-actions">
          <button class="editor-modal-btn editor-modal-btn--cancel" (click)="cancelModal()">
            Cancel
          </button>
          <button class="editor-modal-btn editor-modal-btn--confirm" (click)="confirmModal()">
            {{ modalType === 'input' ? 'Save' : 'Confirm' }}
          </button>
        </div>
        <div *ngIf="modalType === 'select'" class="editor-modal-actions">
          <button class="editor-modal-btn editor-modal-btn--cancel" (click)="cancelModal()">
            Cancel
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
