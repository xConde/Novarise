<svg [attr.width]="size ?? null" [attr.height]="size ?? null"
     [attr.viewBox]="def.viewBox"
     [attr.fill]="resolvedFill"
     [attr.stroke]="resolvedStroke !== 'none' ? resolvedStroke : null"
     [attr.stroke-width]="resolvedStroke !== 'none' ? resolvedStrokeWidth : null"
     [attr.stroke-linecap]="resolvedStroke !== 'none' ? 'round' : null"
     [attr.stroke-linejoin]="resolvedStroke !== 'none' ? 'round' : null"
     aria-hidden="true">
  <ng-container [ngSwitch]="name">

    <ng-container *ngSwitchCase="'gear'">
      <svg:circle cx="12" cy="12" r="3"/>
      <svg:path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </ng-container>

    <ng-container *ngSwitchCase="'heart'">
      <svg:path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78Z"/>
    </ng-container>

    <ng-container *ngSwitchCase="'diamond'">
      <svg:polygon points="12 2 22 9 12 22 2 9"/>
    </ng-container>

    <ng-container *ngSwitchCase="'coin'">
      <svg:circle cx="12" cy="12" r="9"/>
      <svg:line x1="12" y1="7" x2="12" y2="17"/>
      <svg:path d="M9 10 Q9 8 12 8 Q15 8 15 10 Q15 12 12 12 Q9 12 9 14 Q9 16 12 16 Q15 16 15 14"/>
    </ng-container>

    <ng-container *ngSwitchCase="'chevron-left'">
      <svg:path d="M10 12L6 8l4-4"/>
    </ng-container>

    <ng-container *ngSwitchCase="'check'">
      <svg:polyline points="20 6 9 17 4 12"/>
    </ng-container>

    <ng-container *ngSwitchCase="'play'">
      <svg:polygon points="5 3 19 12 5 21 5 3"/>
    </ng-container>

    <ng-container *ngSwitchCase="'pause'">
      <svg:rect x="6" y="4" width="4" height="16"/>
      <svg:rect x="14" y="4" width="4" height="16"/>
    </ng-container>

    <ng-container *ngSwitchCase="'range'">
      <svg:circle cx="12" cy="12" r="10"/>
      <svg:circle cx="12" cy="12" r="6"/>
      <svg:circle cx="12" cy="12" r="2"/>
    </ng-container>

    <ng-container *ngSwitchCase="'activity'">
      <svg:polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </ng-container>

    <ng-container *ngSwitchCase="'sound-on'">
      <svg:polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <svg:path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      <svg:path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
    </ng-container>

    <ng-container *ngSwitchCase="'sound-off'">
      <svg:polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <svg:line x1="23" y1="9" x2="17" y2="15"/>
      <svg:line x1="17" y1="9" x2="23" y2="15"/>
    </ng-container>

    <ng-container *ngSwitchCase="'cart'">
      <svg:circle cx="9" cy="21" r="1"/>
      <svg:circle cx="20" cy="21" r="1"/>
      <svg:path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
    </ng-container>

    <ng-container *ngSwitchCase="'card'">
      <svg:rect x="3" y="2" width="14" height="20" rx="2"/>
      <svg:line x1="7" y1="8" x2="13" y2="8"/>
      <svg:line x1="7" y1="12" x2="13" y2="12"/>
      <svg:line x1="7" y1="16" x2="10" y2="16"/>
    </ng-container>

    <ng-container *ngSwitchCase="'moon'">
      <svg:path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/>
    </ng-container>

    <ng-container *ngSwitchCase="'kills'">
      <svg:line x1="18" y1="6" x2="6" y2="18"/>
      <svg:line x1="6" y1="6" x2="18" y2="18"/>
      <svg:line x1="6" y1="2" x2="6" y2="10"/>
      <svg:line x1="18" y1="14" x2="18" y2="22"/>
    </ng-container>

    <ng-container *ngSwitchCase="'draw-pile'">
      <svg:rect x="3" y="7" width="18" height="14" rx="2"/>
      <svg:path d="M7 7V5a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v2"/>
    </ng-container>

    <ng-container *ngSwitchCase="'discard'">
      <svg:polyline points="3 6 5 6 21 6"/>
      <svg:path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
      <svg:path d="M10 11v6M14 11v6"/>
    </ng-container>

    <ng-container *ngSwitchCase="'exhaust'">
      <svg:path d="M12 2C10 6 7 9 7 13a5 5 0 0 0 10 0c0-4-3-7-5-11Z"/>
      <svg:path d="M12 14c0 1.1-.9 2-2 2"/>
    </ng-container>

    <ng-container *ngSwitchCase="'crosshair'">
      <svg:line x1="12" y1="2" x2="12" y2="9"/>
      <svg:line x1="12" y1="15" x2="12" y2="22"/>
      <svg:line x1="2" y1="12" x2="9" y2="12"/>
      <svg:line x1="15" y1="12" x2="22" y2="12"/>
      <svg:circle cx="12" cy="12" r="3"/>
    </ng-container>

    <ng-container *ngSwitchCase="'bolt'">
      <svg:polyline points="14,3 8,13 12,13 10,21 16,11 12,11"/>
    </ng-container>

    <ng-container *ngSwitchCase="'shield'">
      <svg:path d="M12 3l8 3.5v5c0 4.5-3.5 8.5-8 9.5C7.5 20 4 16 4 11.5V6.5L12 3z"/>
    </ng-container>

    <ng-container *ngSwitchCase="'node-combat'">
      <svg:rect x="3" y="10.5" width="18" height="3" rx="1" transform="rotate(45 12 12)"/>
      <svg:rect x="3" y="10.5" width="18" height="3" rx="1" transform="rotate(-45 12 12)"/>
    </ng-container>

    <ng-container *ngSwitchCase="'node-elite'">
      <svg:polygon points="12,2 14.6,8.4 21.5,8.9 16.3,13.4 17.9,20.1 12,16.5 6.1,20.1 7.7,13.4 2.5,8.9 9.4,8.4"/>
    </ng-container>

    <ng-container *ngSwitchCase="'node-boss'">
      <svg:rect x="1" y="15.5" width="22" height="3" rx="1.5" transform="rotate(45 12 17)"/>
      <svg:rect x="1" y="15.5" width="22" height="3" rx="1.5" transform="rotate(-45 12 17)"/>
      <svg:path d="M12 1C17 1 19 4 19 8C19 12 17 14 15 14L15 18L9 18L9 14C7 14 5 12 5 8C5 4 7 1 12 1Z"/>
      <svg:rect x="6.5" y="4.5" width="4" height="4.5" rx="0.5" fill="#200808"/>
      <svg:rect x="13.5" y="4.5" width="4" height="4.5" rx="0.5" fill="#200808"/>
      <svg:polygon points="11,10.5 13,10.5 12,12.5" fill="#200808"/>
    </ng-container>

    <ng-container *ngSwitchCase="'node-rest'">
      <svg:path d="M12 2C9 7 5 11 5 15.5C5 19.1 8.1 22 12 22C15.9 22 19 19.1 19 15.5C19 11 15 7 12 2Z"/>
    </ng-container>

    <ng-container *ngSwitchCase="'node-shop'">
      <svg:line x1="12" y1="2" x2="12" y2="22"/>
      <svg:path d="M16.5 8C16 5.5 14.5 4.5 12 4.5C9.5 4.5 7.5 6 7.5 8C7.5 10.5 9.5 11 12 12C14.5 13 16.5 13.5 16.5 16C16.5 18.5 14.5 19.5 12 19.5C9.5 19.5 8 18.5 7.5 16"/>
    </ng-container>

    <ng-container *ngSwitchCase="'node-event'">
      <svg:line x1="12" y1="4" x2="12" y2="14"/>
      <svg:line x1="12" y1="19" x2="12.01" y2="19"/>
    </ng-container>

    <ng-container *ngSwitchCase="'node-unknown'">
      <svg:path d="M8 8C8 5 9.5 3.5 12 3.5C14.5 3.5 16 5 16 7.5C16 10 14 11 12 13V15.5"/>
      <svg:line x1="12" y1="20" x2="12.01" y2="20"/>
    </ng-container>

    <ng-container *ngSwitchCase="'kw-terraform'">
      <svg:polyline points="4,19 12,7 20,19"/>
      <svg:polyline points="15,9 18,6 21,9"/>
      <svg:line x1="18" y1="6" x2="18" y2="12"/>
    </ng-container>

    <ng-container *ngSwitchCase="'kw-link'">
      <svg:line x1="7" y1="12" x2="17" y2="12"/>
      <svg:circle cx="6" cy="12" r="3"/>
      <svg:circle cx="18" cy="12" r="3"/>
    </ng-container>

    <ng-container *ngSwitchCase="'kw-exhaust'">
      <svg:rect x="5" y="4" width="14" height="16" rx="2"/>
      <svg:line x1="9" y1="9" x2="15" y2="15"/>
      <svg:line x1="15" y1="9" x2="9" y2="15"/>
    </ng-container>

    <ng-container *ngSwitchCase="'kw-retain'">
      <svg:rect x="5" y="4" width="14" height="16" rx="2"/>
      <svg:path d="M9.5 11 C9.5 8.5 14.5 8.5 14.5 11"/>
      <svg:rect x="8.5" y="11" width="7" height="4" rx="1"/>
    </ng-container>

    <ng-container *ngSwitchCase="'kw-innate'">
      <svg:polygon points="12,3 14.6,9 21,9.5 16.2,13.8 17.8,20 12,16.5 6.2,20 7.8,13.8 3,9.5 9.4,9"/>
    </ng-container>

    <ng-container *ngSwitchCase="'kw-ethereal'">
      <svg:path d="M9,18 C9,15 11,15 11,12 C11,9 9,9 9,6"/>
      <svg:path d="M12,19 C12,16 14,16 14,13 C14,10 12,10 12,7"/>
      <svg:path d="M15,18 C15,15 17,15 17,12 C17,9 15,9 15,6"/>
    </ng-container>

    <!-- Archetype sub-icons (24×24, stroke 1.5, no fill) -->

    <!-- arch-cartographer: compass rose — N/S/E/W cardinal ticks + center circle.
         Communicates survey / orientation / map-reading at a glance. -->
    <ng-container *ngSwitchCase="'arch-cartographer'">
      <svg:circle cx="12" cy="12" r="3"/>
      <svg:line x1="12" y1="2"  x2="12" y2="7"/>
      <svg:line x1="12" y1="17" x2="12" y2="22"/>
      <svg:line x1="2"  y1="12" x2="7"  y2="12"/>
      <svg:line x1="17" y1="12" x2="22" y2="12"/>
      <svg:line x1="5"  y1="5"  x2="8"  y2="8"/>
      <svg:line x1="16" y1="16" x2="19" y2="19"/>
      <svg:line x1="19" y1="5"  x2="16" y2="8"/>
      <svg:line x1="5"  y1="19" x2="8"  y2="16"/>
    </ng-container>

    <!-- arch-highground: mountain peak — two overlapping triangular ridges.
         Reads as elevation / terrain peak without needing fine detail. -->
    <ng-container *ngSwitchCase="'arch-highground'">
      <svg:polyline points="2,19 9,7 16,19"/>
      <svg:polyline points="10,19 16,10 22,19"/>
    </ng-container>

    <!-- arch-conduit: 3-node triangle link — three circles joined by lines.
         Matches the kw-link vocabulary (stroked circles as network nodes). -->
    <ng-container *ngSwitchCase="'arch-conduit'">
      <svg:circle cx="12" cy="5"  r="2"/>
      <svg:circle cx="5"  cy="19" r="2"/>
      <svg:circle cx="19" cy="19" r="2"/>
      <svg:line x1="12" y1="7"  x2="6"  y2="17"/>
      <svg:line x1="12" y1="7"  x2="18" y2="17"/>
      <svg:line x1="7"  y1="19" x2="17" y2="19"/>
    </ng-container>

    <!-- arch-neutral: crosshatch corner mark — two diagonal intersecting lines.
         Blueprint / schematic feel; quietest of the four by intent. -->
    <ng-container *ngSwitchCase="'arch-neutral'">
      <svg:line x1="4"  y1="4"  x2="20" y2="20"/>
      <svg:line x1="20" y1="4"  x2="4"  y2="20"/>
    </ng-container>

    <!-- Effect glyphs (24×24, stroke 1.5) — hero art for non-tower cards.
         Authoritative spec lives in `effect-icon-paths.ts`. -->

    <ng-container *ngSwitchCase="'fx-damage'">
      <svg:circle cx="12" cy="12" r="2.5" fill="currentColor" stroke="none"/>
      <svg:line x1="6"  y1="6"  x2="9"  y2="9"/>
      <svg:line x1="18" y1="6"  x2="15" y2="9"/>
      <svg:line x1="6"  y1="18" x2="9"  y2="15"/>
      <svg:line x1="18" y1="18" x2="15" y2="15"/>
    </ng-container>

    <ng-container *ngSwitchCase="'fx-burn'">
      <svg:path d="M12 3 C 8 8, 6 12, 9 17 C 11 15, 13 15, 15 17 C 18 12, 16 8, 12 3 Z"/>
      <svg:path d="M12 9 C 11 11, 11 13, 12 14 C 13 13, 13 11, 12 9 Z"/>
    </ng-container>

    <ng-container *ngSwitchCase="'fx-poison'">
      <svg:path d="M12 3 L 18 13 A 6 6 0 1 1 6 13 Z"/>
    </ng-container>

    <ng-container *ngSwitchCase="'fx-slow'">
      <svg:line x1="12" y1="3"  x2="12" y2="21"/>
      <svg:line x1="4"  y1="7"  x2="20" y2="17"/>
      <svg:line x1="4"  y1="17" x2="20" y2="7"/>
      <svg:polyline points="9,5 12,3 15,5"/>
      <svg:polyline points="9,19 12,21 15,19"/>
    </ng-container>

    <ng-container *ngSwitchCase="'fx-heal'">
      <svg:path d="M12 3 L 4 6 L 4 12 C 4 17, 8 20, 12 21 C 16 20, 20 17, 20 12 L 20 6 Z"/>
      <svg:line x1="12" y1="9"  x2="12" y2="15"/>
      <svg:line x1="9"  y1="12" x2="15" y2="12"/>
    </ng-container>

    <ng-container *ngSwitchCase="'fx-gold'">
      <svg:ellipse cx="12" cy="7"  rx="7" ry="2.5"/>
      <svg:ellipse cx="12" cy="12" rx="7" ry="2.5"/>
      <svg:ellipse cx="12" cy="17" rx="7" ry="2.5"/>
    </ng-container>

    <ng-container *ngSwitchCase="'fx-draw'">
      <svg:rect x="6" y="11" width="12" height="10" rx="1.5"/>
      <svg:line x1="12" y1="3" x2="12" y2="9"/>
      <svg:polyline points="9,6 12,9 15,6"/>
    </ng-container>

    <ng-container *ngSwitchCase="'fx-energy'">
      <svg:rect x="7" y="5" width="10" height="15" rx="2"/>
      <svg:line x1="10" y1="3" x2="14" y2="3"/>
      <svg:polyline points="13,8 10,13 14,13 11,18"/>
    </ng-container>

    <ng-container *ngSwitchCase="'fx-buff'">
      <svg:polyline points="5,11 12,4 19,11"/>
      <svg:polyline points="5,17 12,10 19,17"/>
      <svg:line x1="5" y1="21" x2="19" y2="21"/>
    </ng-container>

    <ng-container *ngSwitchCase="'fx-scout'">
      <svg:path d="M2 12 C 5 7, 9 5, 12 5 C 15 5, 19 7, 22 12 C 19 17, 15 19, 12 19 C 9 19, 5 17, 2 12 Z"/>
      <svg:circle cx="12" cy="12" r="3"/>
      <svg:circle cx="12" cy="12" r="1" fill="currentColor" stroke="none"/>
    </ng-container>

    <ng-container *ngSwitchCase="'fx-recycle'">
      <svg:path d="M5 9 A 8 8 0 0 1 19 9"/>
      <svg:polyline points="15,5 19,9 15,11"/>
      <svg:path d="M19 15 A 8 8 0 0 1 5 15"/>
      <svg:polyline points="9,19 5,15 9,13"/>
    </ng-container>

  </ng-container>
</svg>
