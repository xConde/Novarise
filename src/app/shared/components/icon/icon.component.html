<svg [attr.width]="size ?? null" [attr.height]="size ?? null"
     [attr.viewBox]="def.viewBox"
     [attr.fill]="resolvedFill"
     [attr.stroke]="resolvedStroke !== 'none' ? resolvedStroke : null"
     [attr.stroke-width]="resolvedStroke !== 'none' ? resolvedStrokeWidth : null"
     [attr.stroke-linecap]="resolvedStroke !== 'none' ? 'round' : null"
     [attr.stroke-linejoin]="resolvedStroke !== 'none' ? 'round' : null"
     aria-hidden="true">
  <ng-container [ngSwitch]="name">

    <ng-container *ngSwitchCase="'gear'">
      <svg:circle cx="12" cy="12" r="3"/>
      <svg:path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </ng-container>

    <ng-container *ngSwitchCase="'heart'">
      <svg:path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78Z"/>
    </ng-container>

    <ng-container *ngSwitchCase="'diamond'">
      <svg:polygon points="12 2 22 9 12 22 2 9"/>
    </ng-container>

    <ng-container *ngSwitchCase="'coin'">
      <svg:circle cx="12" cy="12" r="9"/>
      <svg:line x1="12" y1="7" x2="12" y2="17"/>
      <svg:path d="M9 10 Q9 8 12 8 Q15 8 15 10 Q15 12 12 12 Q9 12 9 14 Q9 16 12 16 Q15 16 15 14"/>
    </ng-container>

    <ng-container *ngSwitchCase="'chevron-left'">
      <svg:path d="M10 12L6 8l4-4"/>
    </ng-container>

    <ng-container *ngSwitchCase="'check'">
      <svg:polyline points="20 6 9 17 4 12"/>
    </ng-container>

    <ng-container *ngSwitchCase="'play'">
      <svg:polygon points="5 3 19 12 5 21 5 3"/>
    </ng-container>

    <ng-container *ngSwitchCase="'pause'">
      <svg:rect x="6" y="4" width="4" height="16"/>
      <svg:rect x="14" y="4" width="4" height="16"/>
    </ng-container>

    <ng-container *ngSwitchCase="'range'">
      <svg:circle cx="12" cy="12" r="10"/>
      <svg:circle cx="12" cy="12" r="6"/>
      <svg:circle cx="12" cy="12" r="2"/>
    </ng-container>

    <ng-container *ngSwitchCase="'activity'">
      <svg:polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </ng-container>

    <ng-container *ngSwitchCase="'sound-on'">
      <svg:polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <svg:path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      <svg:path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
    </ng-container>

    <ng-container *ngSwitchCase="'sound-off'">
      <svg:polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <svg:line x1="23" y1="9" x2="17" y2="15"/>
      <svg:line x1="17" y1="9" x2="23" y2="15"/>
    </ng-container>

    <ng-container *ngSwitchCase="'cart'">
      <svg:circle cx="9" cy="21" r="1"/>
      <svg:circle cx="20" cy="21" r="1"/>
      <svg:path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
    </ng-container>

    <ng-container *ngSwitchCase="'card'">
      <svg:rect x="3" y="2" width="14" height="20" rx="2"/>
      <svg:line x1="7" y1="8" x2="13" y2="8"/>
      <svg:line x1="7" y1="12" x2="13" y2="12"/>
      <svg:line x1="7" y1="16" x2="10" y2="16"/>
    </ng-container>

    <ng-container *ngSwitchCase="'moon'">
      <svg:path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/>
    </ng-container>

    <ng-container *ngSwitchCase="'kills'">
      <svg:line x1="18" y1="6" x2="6" y2="18"/>
      <svg:line x1="6" y1="6" x2="18" y2="18"/>
      <svg:line x1="6" y1="2" x2="6" y2="10"/>
      <svg:line x1="18" y1="14" x2="18" y2="22"/>
    </ng-container>

    <ng-container *ngSwitchCase="'draw-pile'">
      <svg:rect x="3" y="7" width="18" height="14" rx="2"/>
      <svg:path d="M7 7V5a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v2"/>
    </ng-container>

    <ng-container *ngSwitchCase="'discard'">
      <svg:polyline points="3 6 5 6 21 6"/>
      <svg:path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
      <svg:path d="M10 11v6M14 11v6"/>
    </ng-container>

    <ng-container *ngSwitchCase="'exhaust'">
      <svg:path d="M12 2C10 6 7 9 7 13a5 5 0 0 0 10 0c0-4-3-7-5-11Z"/>
      <svg:path d="M12 14c0 1.1-.9 2-2 2"/>
    </ng-container>

    <ng-container *ngSwitchCase="'crosshair'">
      <svg:line x1="12" y1="2" x2="12" y2="10"/>
      <svg:line x1="12" y1="14" x2="12" y2="22"/>
      <svg:line x1="4" y1="12" x2="20" y2="12"/>
      <svg:circle cx="12" cy="12" r="1.5" fill="currentColor"/>
    </ng-container>

    <ng-container *ngSwitchCase="'bolt'">
      <svg:path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
    </ng-container>

    <ng-container *ngSwitchCase="'shield'">
      <svg:path d="M12 2l9 4v6c0 5.25-3.75 10.15-9 11.25C6.75 22.15 3 17.25 3 12V6l9-4z"/>
    </ng-container>

    <ng-container *ngSwitchCase="'node-combat'">
      <svg:rect x="3" y="10.5" width="18" height="3" rx="1" transform="rotate(45 12 12)"/>
      <svg:rect x="3" y="10.5" width="18" height="3" rx="1" transform="rotate(-45 12 12)"/>
    </ng-container>

    <ng-container *ngSwitchCase="'node-elite'">
      <svg:polygon points="12,2 14.6,8.4 21.5,8.9 16.3,13.4 17.9,20.1 12,16.5 6.1,20.1 7.7,13.4 2.5,8.9 9.4,8.4"/>
    </ng-container>

    <ng-container *ngSwitchCase="'node-boss'">
      <svg:rect x="1" y="15.5" width="22" height="3" rx="1.5" transform="rotate(45 12 17)"/>
      <svg:rect x="1" y="15.5" width="22" height="3" rx="1.5" transform="rotate(-45 12 17)"/>
      <svg:path d="M12 1C17 1 19 4 19 8C19 12 17 14 15 14L15 18L9 18L9 14C7 14 5 12 5 8C5 4 7 1 12 1Z"/>
      <svg:rect x="6.5" y="4.5" width="4" height="4.5" rx="0.5" fill="#200808"/>
      <svg:rect x="13.5" y="4.5" width="4" height="4.5" rx="0.5" fill="#200808"/>
      <svg:polygon points="11,10.5 13,10.5 12,12.5" fill="#200808"/>
    </ng-container>

    <ng-container *ngSwitchCase="'node-rest'">
      <svg:path d="M12 2C9 7 5 11 5 15.5C5 19.1 8.1 22 12 22C15.9 22 19 19.1 19 15.5C19 11 15 7 12 2Z"/>
    </ng-container>

    <ng-container *ngSwitchCase="'node-shop'">
      <svg:line x1="12" y1="2" x2="12" y2="22"/>
      <svg:path d="M16.5 8C16 5.5 14.5 4.5 12 4.5C9.5 4.5 7.5 6 7.5 8C7.5 10.5 9.5 11 12 12C14.5 13 16.5 13.5 16.5 16C16.5 18.5 14.5 19.5 12 19.5C9.5 19.5 8 18.5 7.5 16"/>
    </ng-container>

    <ng-container *ngSwitchCase="'node-event'">
      <svg:line x1="12" y1="4" x2="12" y2="14"/>
      <svg:line x1="12" y1="19" x2="12.01" y2="19"/>
    </ng-container>

    <ng-container *ngSwitchCase="'node-unknown'">
      <svg:path d="M8 8C8 5 9.5 3.5 12 3.5C14.5 3.5 16 5 16 7.5C16 10 14 11 12 13V15.5"/>
      <svg:line x1="12" y1="20" x2="12.01" y2="20"/>
    </ng-container>

  </ng-container>
</svg>
