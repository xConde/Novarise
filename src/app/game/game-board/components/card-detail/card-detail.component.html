<div class="card-detail-backdrop"
     (click)="onBackdropClick($event)"
     role="dialog"
     aria-modal="true"
     [attr.aria-label]="definition.name + ' — card details'">
  <div class="card-detail"
       [class]="'card-detail card-detail--' + typeClassSuffix"
       [style.--archetype-trim-color]="archetypeTrimColor"
       [style.--card-backdrop-image]="archetypeBackdropVar">

    <!-- Art zone header strip — backdrop pattern + sub-icon + name/close row.
         The backdrop ::before is absolute over this strip, giving the same
         archetype-identity signal as on card-hand cards without a clip-path. -->
    <div class="card-detail__art-zone" aria-hidden="true">
      <!-- Archetype sub-icon glyph — mirrors card-hand top-left glyph position.
           Purely decorative; screen readers get archetype from the aria-label. -->
      <span class="card-detail__archetype-glyph" aria-hidden="true">
        <app-icon [name]="archetypeIconName" [size]="28"></app-icon>
      </span>
      <!-- Tower footprint — present on tower cards to echo the hand-card pattern. -->
      <span *ngIf="isTowerCard" class="card-detail__footprint" aria-hidden="true">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="4" y="4" width="16" height="16" rx="1"
                stroke="currentColor" stroke-width="1.5" fill="none"/>
        </svg>
      </span>
    </div>

    <!-- Header: name + close -->
    <header class="card-detail__header">
      <div class="card-detail__titles">
        <h2 class="card-detail__name">
          {{ definition.name }}<span *ngIf="card.instance.upgraded" class="card-detail__upgraded">+</span>
        </h2>
        <div class="card-detail__meta">
          <span class="card-detail__type">{{ typeLabel }}</span>
          <span class="card-detail__divider" aria-hidden="true">·</span>
          <span class="card-detail__rarity card-detail__rarity--{{ definition.rarity }}">{{ rarityLabel }}</span>
        </div>
      </div>
      <button class="card-detail__close"
              type="button"
              (click)="close()"
              aria-label="Close card details">×</button>
    </header>

    <!-- Cost / gold strip -->
    <div class="card-detail__costs">
      <span class="card-detail__cost-chip">
        <strong>{{ card.effectiveEnergyCost }}</strong>
        <span>Energy</span>
      </span>
      <span class="card-detail__cost-chip card-detail__cost-chip--gold"
            *ngIf="card.goldCost !== null">
        <strong>{{ card.goldCost }}</strong>
        <span>Gold</span>
      </span>
    </div>

    <!-- Keyword icon badges — mirrors card-hand keyword row.
         Full keyword names in aria-label; icons are decorative. -->
    <div class="card-detail__keywords"
         *ngIf="hasKeywords"
         [attr.aria-label]="keywordsAriaLabel">
      <span *ngIf="definition.terraform" class="card-detail__keyword card-detail__keyword--terraform" aria-label="Terraform">
        <app-icon name="kw-terraform" [size]="14"></app-icon>
      </span>
      <span *ngIf="definition.link" class="card-detail__keyword card-detail__keyword--link" aria-label="Link">
        <app-icon name="kw-link" [size]="14"></app-icon>
      </span>
      <span *ngIf="definition.innate" class="card-detail__keyword card-detail__keyword--innate" aria-label="Innate">
        <app-icon name="kw-innate" [size]="14"></app-icon>
      </span>
      <span *ngIf="definition.retain" class="card-detail__keyword card-detail__keyword--retain" aria-label="Retain">
        <app-icon name="kw-retain" [size]="14"></app-icon>
      </span>
      <span *ngIf="definition.ethereal" class="card-detail__keyword card-detail__keyword--ethereal" aria-label="Ethereal">
        <app-icon name="kw-ethereal" [size]="14"></app-icon>
      </span>
      <span *ngIf="definition.exhaust" class="card-detail__keyword card-detail__keyword--exhaust" aria-label="Exhaust">
        <app-icon name="kw-exhaust" [size]="14"></app-icon>
      </span>
    </div>

    <!-- Descriptions: current + upgraded preview -->
    <section class="card-detail__body" aria-label="Card rules text">
      <div class="card-detail__desc-block">
        <h3 class="card-detail__desc-label">{{ card.instance.upgraded ? 'Effect' : 'Current effect' }}</h3>
        <p class="card-detail__desc">
          <app-description-text
            [description]="card.instance.upgraded ? upgradedDescription : definition.description">
          </app-description-text>
        </p>
      </div>
      <div class="card-detail__desc-block card-detail__desc-block--upgraded"
           *ngIf="hasUpgrade && !card.instance.upgraded">
        <h3 class="card-detail__desc-label card-detail__desc-label--upgraded">After upgrade</h3>
        <p class="card-detail__desc card-detail__desc--upgraded">
          <app-description-text [description]="upgradedDescription"></app-description-text>
        </p>
      </div>
    </section>

    <!-- Footer hint -->
    <footer class="card-detail__footer">
      <span class="card-detail__hint" aria-hidden="true">Esc or click outside to close</span>
    </footer>

  </div>
</div>
