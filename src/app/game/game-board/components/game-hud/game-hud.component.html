<div class="game-hud">
  <div class="hud-stat">
    <span class="hud-label">Lives</span>
    <span class="hud-value lives" [class.critical]="lives <= 5">{{ lives }}</span>
  </div>
  <div class="hud-stat">
    <span class="hud-label">Gold</span>
    <span class="hud-value gold">{{ gold }}</span>
  </div>
  <div class="hud-stat">
    <span class="hud-label">Wave</span>
    <span class="hud-value" *ngIf="!isEndless">{{ wave }} / {{ maxWaves }}</span>
    <span class="hud-value" *ngIf="isEndless">{{ wave }}</span>
  </div>
  <div class="hud-stat secondary">
    <span class="hud-label">Score</span>
    <span class="hud-value">{{ score }}</span>
  </div>
  <div class="hud-stat secondary">
    <span class="hud-label">Time</span>
    <span class="hud-value">{{ formattedTime }}</span>
  </div>
  <span class="hud-level-name" *ngIf="isCampaignGame && levelName" aria-label="Level name">{{ levelName }}</span>
</div>
