<div class="game-hud">
  <div class="hud-stats-row">
    <div class="hud-stat">
      <span class="hud-label">Lives</span>
      <span class="hud-value lives" [class.critical]="lives <= 5">{{ lives }}</span>
    </div>
    <div class="hud-stat">
      <span class="hud-label">Gold</span>
      <span class="hud-value gold" [class.gold-pulse]="goldPulse">{{ gold }}</span>
      <span class="gold-change" *ngIf="goldChange > 0">+{{ goldChange }}g</span>
    </div>
    <div class="hud-stat">
      <span class="hud-label">Wave</span>
      <span class="hud-value" [class.wave-start-pulse]="waveStartPulse" *ngIf="!isEndless">{{ wave }} / {{ maxWaves }}</span>
      <span class="hud-value" [class.wave-start-pulse]="waveStartPulse" *ngIf="isEndless">{{ wave }}</span>
    </div>
    <div class="hud-stat secondary">
      <span class="hud-label">Score</span>
      <span class="hud-value" [class.score-pulse]="scorePulse">{{ score }}</span>
    </div>
    <div class="hud-stat secondary">
      <span class="hud-label">Time</span>
      <span class="hud-value">{{ formattedTime }}</span>
    </div>
  </div>
</div>
<div class="hud-challenge-strip"
     *ngIf="challengeIndicators.length > 0"
     aria-label="Challenge progress">
  <button class="hud-challenge-toggle"
          (click)="toggleChallengeStrip()"
          [attr.aria-expanded]="challengeStripExpanded"
          [attr.aria-label]="challengeStripExpanded ? 'Collapse challenge indicators' : 'Expand challenge indicators'">
    <span *ngIf="!challengeStripExpanded" class="hud-challenge-summary">
      <span class="challenge-dot challenge-dot--passing" *ngFor="let _ of [].constructor(passingCount)">✓</span>
      <span class="challenge-dot challenge-dot--failing" *ngFor="let _ of [].constructor(failingCount)">✗</span>
    </span>
    <span *ngIf="challengeStripExpanded" aria-hidden="true">×</span>
  </button>
  <ng-container *ngIf="challengeStripExpanded">
    <span
      class="challenge-indicator"
      *ngFor="let ci of challengeIndicators"
      [class.passing]="ci.passing"
      [class.failing]="!ci.passing"
      [attr.aria-label]="ci.label + ': ' + ci.value"
      [attr.title]="getChallengeHelp(ci)">
      {{ ci.label }}: {{ ci.value }}
    </span>
  </ng-container>
</div>
<div class="hud-wave-status"
     *ngIf="isCombat"
     [class.hud-wave-status--critical]="enemiesRemaining > 0 && enemiesRemaining <= 2"
     [class.hud-wave-status--cleared]="enemiesRemaining === 0"
     aria-live="polite">
  <span class="wave-enemy-count">{{ enemiesRemaining }}</span>
  {{ enemiesRemaining === 1 ? 'enemy remaining' : 'enemies remaining' }}
  <span
    *ngIf="isEndless && currentEndlessTemplate"
    class="wave-template-badge"
    aria-label="Current wave type">
    {{ currentEndlessTemplate }}
  </span>
</div>
