<div class="card-hand" role="toolbar" aria-label="Card hand">

  <!-- Energy display — pip orbs -->
  <div class="card-hand__energy"
       [attr.aria-label]="'Energy: ' + energy.current + ' of ' + energy.max">
    <span class="energy-label">ENERGY</span>
    <div class="energy-pips" aria-hidden="true">
      <span
        *ngFor="let pip of energyPips; let i = index"
        class="energy-pip"
        [class.energy-pip--filled]="i < energy.current">
      </span>
    </div>
    <span class="energy-fraction">{{ energy.current }}/{{ energy.max }}</span>
  </div>

  <!-- Cards -->
  <div class="card-hand__cards"
       [class.card-hand__cards--fan]="isFan"
       [style.--card-fan-margin]="cardFanMargin"
       role="list">
    <button
      *ngFor="let card of handCards"
      class="card"
      role="listitem"
      [ngClass]="[getCardTypeClass(card.definition.type), getRarityClass(card.definition.rarity)]"
      [class.card--playable]="card.canPlay && pendingCardId === null"
      [class.card--unplayable]="!card.canPlay"
      [class.card--upgraded]="card.instance.upgraded"
      [class.card--pending]="card.instance.instanceId === pendingCardId"
      [class.card--dimmed]="pendingCardId !== null && card.instance.instanceId !== pendingCardId"
      [class.card--playing]="card.instance.instanceId === playingCardId"
      [disabled]="!card.canPlay || (pendingCardId !== null && card.instance.instanceId !== pendingCardId)"
      (click)="playCard(card)"
      [attr.aria-label]="card.definition.name + ' — ' + card.definition.description + ' — Energy cost: ' + card.definition.energyCost + (card.instance.upgraded ? ' (upgraded)' : '')"
      [attr.aria-pressed]="card.instance.instanceId === pendingCardId"
      [attr.aria-disabled]="!card.canPlay"
      [style.--card-tower-accent]="getTowerAccentColor(card)">

      <!-- Energy cost badge -->
      <span class="card__cost" [class.card__cost--affordable]="card.canPlay"
            aria-hidden="true">{{ card.definition.energyCost }}</span>

      <!-- Upgraded indicator -->
      <span class="card__upgraded-badge" *ngIf="card.instance.upgraded" aria-hidden="true">+</span>

      <!-- Card name -->
      <span class="card__name">{{ card.definition.name }}</span>

      <!-- Gold cost — shown only on tower cards -->
      <span class="card__gold-cost" *ngIf="card.goldCost !== null" [attr.aria-label]="card.goldCost + ' gold'">
        {{ card.goldCost }}g
      </span>

      <!-- Type icon (SVG, no text) — Sprint 11: 40px dominant art icon -->
      <span class="card__type-icon" aria-hidden="true">
        <app-icon *ngIf="card.definition.type === CardType.TOWER" name="crosshair" [size]="40"></app-icon>
        <app-icon *ngIf="card.definition.type === CardType.SPELL" name="bolt" [size]="40"></app-icon>
        <app-icon *ngIf="card.definition.type === CardType.MODIFIER" name="shield" [size]="40"></app-icon>
        <app-icon *ngIf="card.definition.type === CardType.UTILITY" name="gear" [size]="40"></app-icon>
      </span>

      <!-- Instance dot — tints per-instance so identical cards are distinguishable -->
      <span class="card__instance-dot"
            [style.background]="'hsl(' + instanceHue(card.instance.instanceId) + ', 70%, 55%)'"
            aria-hidden="true"></span>

      <!-- Sprint 31: keyboard hotkey badge — shows slot number (1-9) on desktop only -->
      <span class="card__hotkey"
            *ngIf="getCardIndex(card) !== null && (getCardIndex(card)!) < 9"
            aria-hidden="true">{{ (getCardIndex(card)!) + 1 }}</span>

      <!-- Sprint 35: card description tooltip — visible on hover/focus (desktop only) -->
      <span class="card__tooltip" role="tooltip" aria-hidden="true">
        {{ card.definition.description }}
      </span>

    </button>
  </div>

  <!-- Placement mode hint -->
  <div class="card-hand__placement-hint" *ngIf="pendingCardId !== null" aria-live="polite">
    <span class="placement-hint-text">Place tower on the board...</span>
  </div>

  <!-- Draw / discard pile counts — clickable to inspect -->
  <div class="card-hand__piles" [attr.aria-label]="'Deck piles'">
    <button class="pile-count pile-count--draw"
            type="button"
            [class.pile-count--pulse]="drawPulse"
            [attr.aria-label]="'Inspect draw pile: ' + deckState.drawPile.length + ' cards'"
            (click)="inspectPile('draw')">
      <app-icon name="draw-pile" [size]="12"></app-icon>
      <span class="pile-label">Draw</span>
      <span class="pile-value">{{ deckState.drawPile.length }}</span>
    </button>
    <button class="pile-count pile-count--discard"
            type="button"
            [class.pile-count--pulse]="discardPulse"
            [attr.aria-label]="'Inspect discard pile: ' + deckState.discardPile.length + ' cards'"
            (click)="inspectPile('discard')">
      <app-icon name="discard" [size]="12"></app-icon>
      <span class="pile-label">Disc</span>
      <span class="pile-value">{{ deckState.discardPile.length }}</span>
    </button>
  </div>

</div>
