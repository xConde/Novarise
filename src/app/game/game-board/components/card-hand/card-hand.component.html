<div class="card-hand" role="toolbar" aria-label="Card hand">

  <!-- Energy display — pip orbs -->
  <div class="card-hand__energy"
       [attr.aria-label]="'Energy: ' + energy.current + ' of ' + energy.max">
    <span class="energy-label">ENERGY</span>
    <div class="energy-pips" aria-hidden="true">
      <span
        *ngFor="let pip of energyPips; let i = index"
        class="energy-pip"
        [class.energy-pip--filled]="i < energy.current">
      </span>
    </div>
    <span class="energy-fraction">{{ energy.current }}/{{ energy.max }}</span>
  </div>

  <!-- Cards -->
  <div class="card-hand__cards"
       [class.card-hand__cards--fan]="isFan"
       [style.--card-fan-margin]="cardFanMargin"
       role="list">
    <button
      *ngFor="let card of handCards"
      class="card"
      role="listitem"
      [ngClass]="[getCardTypeClass(card.definition.type), getRarityClass(card.definition.rarity)]"
      [class.card--playable]="card.canPlay && pendingCardId === null"
      [class.card--unplayable]="!card.canPlay"
      [class.card--upgraded]="card.instance.upgraded"
      [class.card--pending]="card.instance.instanceId === pendingCardId"
      [class.card--dimmed]="pendingCardId !== null && card.instance.instanceId !== pendingCardId"
      [class.card--playing]="card.instance.instanceId === playingCardId"
      [class.card--frame-tower]="card.definition.type === CardType.TOWER"
      [class.card--frame-spell]="card.definition.type === CardType.SPELL"
      [class.card--frame-modifier]="card.definition.type === CardType.MODIFIER"
      [class.card--frame-utility]="card.definition.type === CardType.UTILITY"
      [disabled]="!card.canPlay || (pendingCardId !== null && card.instance.instanceId !== pendingCardId)"
      (click)="onCardClick(card)"
      (contextmenu)="onCardContextMenu($event, card)"
      (pointerdown)="onCardPointerDown($event, card)"
      (pointermove)="onCardPointerMove($event)"
      (pointerup)="onCardPointerUp()"
      (pointercancel)="onCardPointerUp()"
      (pointerleave)="onCardPointerLeave($event); onCardPointerUp()"
      (pointerenter)="onCardPointerEnter($event, card)"
      [attr.aria-label]="card.definition.name + ' — Energy cost: ' + card.effectiveEnergyCost + (card.instance.upgraded ? ' (upgraded)' : '') + '. ' + card.definition.description + '. Right-click or long-press for details.'"
      [attr.aria-describedby]="hoveredCard?.instance?.instanceId === card.instance.instanceId ? hoverTooltipId : null"
      [attr.aria-pressed]="card.instance.instanceId === pendingCardId"
      [attr.aria-disabled]="!card.canPlay"
      [style.--card-tower-accent]="getTowerAccentColor(card)"
      [style.--archetype-trim-color]="getArchetypeTrimColor(card)"
      [style.--archetype-trim-color-strong]="getArchetypeTrimColorStrong(card)">

      <!-- Cost pill — value + "Energy" as one inline-flex chip so it reads as a single element.
           Shows effectiveEnergyCost (post-relic discount, e.g. WORLD_SPIRIT). -->
      <span class="card__cost" [class.card__cost--affordable]="card.canPlay" aria-hidden="true">
        <strong class="card__cost-value">{{ card.effectiveEnergyCost }}</strong>
        <span class="card__cost-label">Energy</span>
      </span>

      <!-- Upgraded indicator -->
      <span class="card__upgraded-badge" *ngIf="card.instance.upgraded" aria-hidden="true">+</span>

      <!-- Type icon — small corner chip (top-right) signalling card type. -->
      <span class="card__type-icon" aria-hidden="true">
        <app-icon *ngIf="card.definition.type === CardType.TOWER" name="crosshair" [size]="20"></app-icon>
        <app-icon *ngIf="card.definition.type === CardType.SPELL" name="bolt" [size]="20"></app-icon>
        <app-icon *ngIf="card.definition.type === CardType.MODIFIER" name="shield" [size]="20"></app-icon>
        <app-icon *ngIf="card.definition.type === CardType.UTILITY" name="gear" [size]="20"></app-icon>
      </span>

      <!-- Card name -->
      <span class="card__name">{{ card.definition.name }}</span>

      <!-- Gold cost — shown only on tower cards -->
      <span class="card__gold-cost" *ngIf="card.goldCost !== null" [attr.aria-label]="card.goldCost + ' gold'">
        {{ card.goldCost }}g
      </span>

      <!-- Keyword icon badges — one icon per active keyword so players can spot
           terraform / link / innate / retain / ethereal / exhaust at a glance.
           Full keyword names live in the card detail modal (right-click / long-press).
           Icons use currentColor; each modifier class tints via --keyword-color-* tokens. -->
      <span class="card__keywords"
            *ngIf="card.definition.terraform || card.definition.link || card.definition.innate || card.definition.retain || card.definition.ethereal || card.definition.exhaust"
            [attr.aria-label]="keywordAriaLabel(card)">
        <span *ngIf="card.definition.terraform" class="card__keyword card__keyword--terraform" [attr.aria-label]="'Terraform'">
          <app-icon name="kw-terraform" [size]="14"></app-icon>
        </span>
        <span *ngIf="card.definition.link" class="card__keyword card__keyword--link" [attr.aria-label]="'Link'">
          <app-icon name="kw-link" [size]="14"></app-icon>
        </span>
        <span *ngIf="card.definition.innate" class="card__keyword card__keyword--innate" [attr.aria-label]="'Innate'">
          <app-icon name="kw-innate" [size]="14"></app-icon>
        </span>
        <span *ngIf="card.definition.retain" class="card__keyword card__keyword--retain" [attr.aria-label]="'Retain'">
          <app-icon name="kw-retain" [size]="14"></app-icon>
        </span>
        <span *ngIf="card.definition.ethereal" class="card__keyword card__keyword--ethereal" [attr.aria-label]="'Ethereal'">
          <app-icon name="kw-ethereal" [size]="14"></app-icon>
        </span>
        <span *ngIf="card.definition.exhaust" class="card__keyword card__keyword--exhaust" [attr.aria-label]="'Exhaust'">
          <app-icon name="kw-exhaust" [size]="14"></app-icon>
        </span>
      </span>

      <!-- Instance dot — tints per-instance so identical cards are distinguishable -->
      <span class="card__instance-dot"
            [style.background]="'hsl(' + instanceHue(card.instance.instanceId) + ', 70%, 55%)'"
            aria-hidden="true"></span>

    </button>
  </div>

  <!-- Draw / discard / exhaust pile counts — clickable to inspect -->
  <div class="card-hand__piles" [attr.aria-label]="'Deck piles'">
    <button class="pile-count pile-count--draw"
            type="button"
            [class.pile-count--pulse]="drawPulse"
            [attr.aria-label]="'Inspect draw pile: ' + deckState.drawPile.length + ' cards'"
            (click)="inspectPile('draw')">
      <app-icon name="draw-pile" [size]="12"></app-icon>
      <span class="pile-label">Draw</span>
      <span class="pile-value">{{ deckState.drawPile.length }}</span>
    </button>
    <button class="pile-count pile-count--discard"
            type="button"
            [class.pile-count--pulse]="discardPulse"
            [attr.aria-label]="'Inspect discard pile: ' + deckState.discardPile.length + ' cards'"
            (click)="inspectPile('discard')">
      <app-icon name="discard" [size]="12"></app-icon>
      <span class="pile-label">Disc</span>
      <span class="pile-value">{{ deckState.discardPile.length }}</span>
    </button>
    <button class="pile-count pile-count--exhaust"
            type="button"
            [class.pile-count--pulse]="exhaustPulse"
            [attr.aria-label]="'Inspect exhaust pile: ' + deckState.exhaustPile.length + ' cards'"
            (click)="inspectPile('exhaust')">
      <app-icon name="exhaust" [size]="12"></app-icon>
      <span class="pile-label">Exh</span>
      <span class="pile-value">{{ deckState.exhaustPile.length }}</span>
    </button>
  </div>

  <!-- Hover tooltip — desktop hover only. Fixed-positioned to escape any
       overflow:hidden ancestor; touch users get the full detail modal via
       long-press instead. -->
  <div *ngIf="hoveredCard"
       class="card-tooltip"
       role="tooltip"
       [id]="hoverTooltipId"
       [style.top.px]="hoverTooltipTop"
       [style.left.px]="hoverTooltipLeft">
    <div class="card-tooltip__header">
      <span class="card-tooltip__name">{{ hoveredCard.definition.name }}</span>
      <span class="card-tooltip__cost">{{ hoveredCard.effectiveEnergyCost }}E</span>
    </div>
    <div class="card-tooltip__meta">
      <span class="card-tooltip__type">{{ hoveredCard.definition.type }}</span>
      <span class="card-tooltip__rarity card-tooltip__rarity--{{ hoveredCard.definition.rarity }}">
        {{ hoveredCard.definition.rarity }}
      </span>
      <span *ngIf="hoveredCard.instance.upgraded" class="card-tooltip__upgraded">+upgraded</span>
    </div>
    <p class="card-tooltip__description">
      <app-description-text [description]="hoverTooltipDescription(hoveredCard)"></app-description-text>
    </p>
    <div *ngIf="hoverTooltipKeywords(hoveredCard).length > 0" class="card-tooltip__keywords">
      <span *ngFor="let kw of hoverTooltipKeywords(hoveredCard)" class="card-tooltip__keyword">{{ kw }}</span>
    </div>
    <p *ngIf="hoveredCard.definition.flavorText"
       class="card-tooltip__flavor"
       [attr.aria-label]="'Flavor: ' + hoveredCard.definition.flavorText">
      "{{ hoveredCard.definition.flavorText }}"
    </p>
  </div>

</div>
