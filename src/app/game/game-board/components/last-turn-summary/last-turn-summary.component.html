<aside class="last-turn-summary"
       *ngIf="hasRecords"
       aria-live="polite"
       aria-label="Recap of recent turns">
  <h4 class="last-turn-summary__title">Recap</h4>
  <ol class="last-turn-summary__list">
    <li *ngFor="let row of displayRows; let i = index"
        class="last-turn-summary__row"
        [class.last-turn-summary__row--recent]="i === 0"
        [class.last-turn-summary__row--quiet]="isQuietTurn(row)">
      <span class="last-turn-summary__turn">T{{ row.turnNumber }}</span>
      <ng-container *ngIf="!isQuietTurn(row); else quietTpl">
        <span class="last-turn-summary__stats">
          <span class="last-turn-summary__stat" *ngIf="row.cardsPlayed > 0"
                [attr.title]="row.cardsPlayed + ' card' + (row.cardsPlayed === 1 ? '' : 's') + ' played'">
            {{ row.cardsPlayed }}<span class="last-turn-summary__unit">p</span>
          </span>
          <span class="last-turn-summary__stat" *ngIf="row.kills > 0"
                [attr.title]="row.kills + ' enem' + (row.kills === 1 ? 'y' : 'ies') + ' killed'">
            {{ row.kills }}<span class="last-turn-summary__unit">k</span>
          </span>
          <span class="last-turn-summary__stat last-turn-summary__stat--gold"
                *ngIf="row.goldEarned > 0"
                [attr.title]="'+' + row.goldEarned + ' gold earned'">
            +{{ row.goldEarned }}g
          </span>
          <span class="last-turn-summary__stat last-turn-summary__stat--danger"
                *ngIf="row.livesLost > 0"
                [attr.title]="row.livesLost + ' life' + (row.livesLost === 1 ? '' : 's') + ' lost'">
            &minus;{{ row.livesLost }}<span class="last-turn-summary__unit">&hearts;</span>
          </span>
        </span>
      </ng-container>
      <ng-template #quietTpl>
        <span class="last-turn-summary__quiet">—</span>
      </ng-template>
    </li>
  </ol>
</aside>
