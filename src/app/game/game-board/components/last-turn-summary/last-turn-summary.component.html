<div class="last-turn-summary"
     *ngIf="visible && summary"
     aria-live="polite"
     [attr.aria-label]="'Last turn summary'">
  <span class="last-turn-summary__label">Turn {{ summary.turnNumber }}</span>
  <span class="last-turn-summary__stat" *ngIf="summary.cardsPlayed > 0">
    <span class="last-turn-summary__value">{{ summary.cardsPlayed }}</span> played
  </span>
  <span class="last-turn-summary__stat" *ngIf="summary.kills > 0">
    <span class="last-turn-summary__value">{{ summary.kills }}</span> killed
  </span>
  <span class="last-turn-summary__stat last-turn-summary__stat--gold" *ngIf="summary.goldEarned > 0">
    +{{ summary.goldEarned }}g
  </span>
  <span class="last-turn-summary__stat last-turn-summary__stat--danger" *ngIf="summary.livesLost > 0">
    &minus;{{ summary.livesLost }} lives
  </span>
</div>
