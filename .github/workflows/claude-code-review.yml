name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "src/**/*.ts"
      - "src/**/*.html"
      - "src/**/*.scss"
      - "package.json"
      - "tsconfig.json"
      - ".github/workflows/**"
    paths-ignore:
      - "package-lock.json"

jobs:
  claude-review:
    if: |
      !contains(github.event.pull_request.title, '[skip-review]') &&
      !contains(github.event.pull_request.title, '[WIP]')

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
      id-token: write

    steps:
      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret is not configured."
            echo "Please add the secret at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 50
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch base branch for diff
        run: git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }} --depth=50

      - name: Check PR size
        id: pr-size
        run: |
          DIFF_STAT=$(git diff --shortstat origin/${{ github.base_ref }}...HEAD)
          echo "Diff statistics: $DIFF_STAT"

          FILES_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l)
          echo "Files changed: $FILES_CHANGED"

          if [ $FILES_CHANGED -gt 50 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "PR has $FILES_CHANGED changed files (limit: 50). Claude review skipped." >> $GITHUB_STEP_SUMMARY
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Claude Code Review
        if: steps.pr-size.outputs.skip != 'true'
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          direct_prompt: |
            Please review this pull request for Novarise — an Angular 15 + Three.js tower defense game with a map editor.

            Focus on:
            - **Magic numbers**: All numeric literals (colors, sizes, timings, thresholds) must live in constants files, not inline
            - **Three.js disposal**: Geometries, materials, textures, render targets, and shader passes must be disposed in ngOnDestroy. Web Audio nodes must be disconnected.
            - **Coordinate systems**: Editor uses `tiles[x][z]` (column-major), game uses `board[row][col]` (row-major). Verify no cross-wiring in any map conversion or pathfinding code.
            - **State mutation**: Confirm-before-spend pattern — always verify service mutation succeeds BEFORE deducting resources (gold, lives). Same for sell refunds.
            - **TypeScript strictness**: No `any` casts, proper typing on all new code
            - **Memory leaks**: Subscriptions unsubscribed, event listeners removed, GPU resources freed
            - **Test coverage**: New logic should have corresponding tests

            Be constructive and specific in your feedback.

          allowed_tools: "Bash(npx ng build),Bash(npx ng test --no-watch --browsers=ChromeHeadless)"
