name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          allowed_tools: "Bash(npm install),Bash(npx ng build),Bash(npx ng test --no-watch --browsers=ChromeHeadless)"

          custom_instructions: |
            This is Novarise — an Angular 15 + Three.js tower defense game with a map editor.

            Key areas:
            - Map Editor (src/app/games/novarise/) — terrain painting, height editing, spawn/exit placement, path validation
            - Tower Defense Game (src/app/game/) — board generation, tower placement/upgrade/sell, A* pathfinding, wave spawning, projectile combat
            - Constants architecture: all magic numbers in constants files (editor-ui.constants.ts, ui.constants.ts, audio.constants.ts)
            - Coordinate systems: editor tiles[x][z] (column-major), game board[row][col] (row-major)
            - Three.js disposal: all geometries/materials/textures/render targets must be cleaned up in ngOnDestroy
            - State mutation: confirm-before-spend pattern for gold/lives

            Follow TypeScript strict mode. All new code needs tests.
            Reference CLAUDE.md for project conventions.
